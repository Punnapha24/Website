<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Maintenance</title>
</head>
<body>

  <nav>
    <h2>Maintenance App</h2>
    <ul>
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">History & Edit</a></li>
    </ul>
  </nav>

  <hr> 

  <section id="dashboardView">
    <h3>Select a Form for Maintenance</h3>
    <ul>
      <li><button>Electrical System</button></li>
      <li><button>UPS System</button></li>
      <li><button>Temperature System of Service Room</button></li>
      <li><button>Temperature System of UPS & Battery Room</button></li>
      <li><button>Fire Annunciator Panel System</button></li>
      <li><button>Fire Suppression System</button></li>
      <li><button>Water Leak Detection System</button></li>
      <li><button>Access Control System</button></li>
      <li><button>CCTV</button></li>
      <li><button>Check Rack Customer</button></li>
      <li><button>Generator System</button></li>
      <li><button>Fuel System</button></li>
      <li><button>Breaking Glass</button></li>
    </ul>
  </section>

  <hr>

  <section id="formView">
    <button>Back to Dashboard</button>
    
    <h3>Maintenance Record</h3>
    
    <form>
      <div>
        <label for="room">Room:</label>
        <input type="text" id="room" value="Room 1" readonly>
      </div>
      <br>

      <div>
        <label for="name">Inspector Name * :</label>
        <select id="name" required>
          <option value="" selected disabled>Select Name...</option>
          <option value="Name1">Name1</option>
          <option value="Name2">Name2</option>
          <option value="Name3">Name3</option>
          <option value="Name4">Name4</option>
        </select>
      </div>
      <br>

      <div>
        <label for="date">Date * :</label>
        <input type="date" id="date" required>
      </div>
      <br>

      <div>
        <label for="time">Time * :</label>
        <input type="time" id="time" required>
      </div>
      <br>

      <div>
        <label for="temperature">Temperature (°C) * :</label>
        <input type="number" step="0.01" id="temperature" placeholder="0.00" required>
      </div>
      <br>

      <div>
        <label for="humidity">Humidity (%) * :</label>
        <input type="number" step="0.01" id="humidity" placeholder="0.00" required>
      </div>
      <br>

      <div>
        <label for="power">Power (W) * :</label>
        <input type="number" step="0.01" id="power" placeholder="0.00" required>
      </div>
      <br>

      <button type="submit">Save Data</button>
    </form>
  </section>

  <hr>

  <section id="tableView">
    <h3>Overall Maintenance History</h3>
    <button>Refresh</button>
    <br><br>

    <table border="1" cellspacing="0" cellpadding="5">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Room</th>
          <th>Name</th>
          <th>Temp.</th>
          <th>Humidity</th>
          <th>Power</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="8" align="center">No data loaded. Click Refresh.</td>
        </tr>
      </tbody>
    </table>
  </section>

</body>
</html>
